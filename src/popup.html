<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Lock</title>
</head>
<body>
    <h1>Study Lock</h1>

    <label for="topic">Study topic</label>
    <input id="topic" type="text" placeholder="e.g. COMP20007 topological sort" />

    <br /><br />

    <label for="minutes">Minutes</label>
    <input id="minutes" type="number" value="60" min="1" />

    <br /><br />

    <button id="startBtn">Start study session</button>
    <button id="endBtn">End session</button>
    <button id="optionsBtn">Open options</button>

    <p id="status">No active session.</p>

    <script type="module" src="./popup.ts"></script>
</body>
</html>
