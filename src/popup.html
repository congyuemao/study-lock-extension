<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Lock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 320px;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 16px 0;
            font-size: 24px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            margin-bottom: 16px;
        }

        .mode-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .mode-row input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .mode-tip {
            margin: 0 0 16px 0;
            color: #666;
            font-size: 12px;
            line-height: 1.4;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .panel {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 12px;
            margin-top: 12px;
        }

            .panel h2 {
                margin: 0 0 10px 0;
                font-size: 16px;
            }

        .muted {
            color: #666;
        }

        ul {
            margin: 8px 0 0 18px;
            padding: 0;
        }

        li {
            margin-bottom: 4px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>Study Lock</h1>

    <label for="topic">Study topic</label>
    <input id="topic" type="text" placeholder="e.g. COMP20007 topological sort" />

    <label for="minutes">Minutes</label>
    <input id="minutes" type="number" value="60" min="1" />

    <div class="mode-row">
        <input id="burnMode" type="checkbox" />
        <label for="burnMode">Burn mode</label>
    </div>
    <p class="mode-tip">When enabled: manual stop is disabled during session, and page close/leave is blocked as much as browser APIs allow.</p>

    <div class="actions">
        <button id="startBtn">Start session</button>
        <button id="endBtn">End session</button>
        <button id="optionsBtn">Open options</button>
    </div>

    <p id="status">No active session.</p>

    <div class="panel">
        <h2>Current session</h2>
        <p id="sessionInfo" class="muted">No active session.</p>
    </div>

    <div class="panel">
        <h2>Allowlist domains</h2>
        <p id="allowlistCount" class="muted">Loading...</p>
        <ul id="allowlistList"></ul>
    </div>

    <script type="module" src="./popup.ts"></script>
</body>
</html>
